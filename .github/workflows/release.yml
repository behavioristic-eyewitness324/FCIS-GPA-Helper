name: Build and Update Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create ZIP
        run: |
          zip -r "FCIS-GPA-Helper-v${{ steps.version.outputs.version }}.zip" . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x "README.md" \
            -x "node_modules/*"

      - name: Update tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -f "$TAG"
          git push origin "refs/tags/$TAG" --force

      - name: Delete old asset (if exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          ASSET_NAME="FCIS-GPA-Helper-v${{ steps.version.outputs.version }}.zip"

          RELEASE=$(gh api repos/${{ github.repository }}/releases/tags/$TAG || true)

          if [ -n "$RELEASE" ]; then
            ASSET_ID=$(echo "$RELEASE" | jq -r ".assets[] | select(.name==\"$ASSET_NAME\") | .id")

            if [ "$ASSET_ID" != "" ] && [ "$ASSET_ID" != "null" ]; then
              gh api \
                --method DELETE \
                repos/${{ github.repository }}/releases/assets/$ASSET_ID
            fi
          fi

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: FCIS GPA Helper v${{ steps.version.outputs.version }}
          generate_release_notes: true
          make_latest: true
          files: FCIS-GPA-Helper-v${{ steps.version.outputs.version }}.zip