name: Build and Update Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create ZIP
        run: |
          zip -r "FCIS-GPA-Helper-v${{ steps.version.outputs.version }}.zip" . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x "version.json" \
            -x "README.md" \
            -x "node_modules/*"

      - name: Create or Update Tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Updating existing tag..."
            git tag -fa "$TAG" -m "Update $TAG"
          else
            echo "Creating new tag..."
            git tag -a "$TAG" -m "Release $TAG"
          fi

          git push origin "refs/tags/$TAG" --force

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: FCIS GPA Helper v${{ steps.version.outputs.version }}
          generate_release_notes: true
          make_latest: true
          overwrite_files: true
          files: |
            FCIS-GPA-Helper-v${{ steps.version.outputs.version }}.zip